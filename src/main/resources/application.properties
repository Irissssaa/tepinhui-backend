# ============================================
# 特品汇后端配置文件
# ============================================

# 应用配置
spring.application.name=tepinhui-backend

# API 路径配置说明:
# ----------------
# app.api-prefix: 设置 server.servlet.context-path
# 所有 REST 端点的 URL 路径都会加上此前缀
#
# 示例:
#   /tph    → /tph/auth/login, /tph/products, /tph/health
#   /api    → /api/auth/login, /api/products, /api/health
#   /       → /auth/login, /products, /health
#
# 注意:
#   - 前端 API base URL = http://host:port + app.api-prefix
#   - Nginx 反向代理需配置对应的 location 路径
#   - 健康检查端点实际路径: ${context-path}${health-endpoint} = /tph/health
app.api-prefix=${APP_API_PREFIX:/tph}

# 健康检查端点路径（相对于 context-path）
# 实际健康检查 URL: http://host:port${app.api-prefix}${app.health-endpoint}
# 例如: http://localhost:8060/tph/health
app.health-endpoint=${APP_HEALTH_ENDPOINT:/health}

# 激活的环境配置
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ============================================
# 数据源配置 (MySQL 8.0)
# ============================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://82.156.12.252:3306/tepinhui?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=tepinhui
spring.datasource.password=${DB_PASSWORD:tepinhui231}

# HikariCP 连接池配置
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ============================================
# Redis 配置
# ============================================
spring.data.redis.host=82.156.12.252
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:yymRFrnZ2zaKPeke}
spring.data.redis.database=0
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=-1ms

# ============================================
# MyBatis-Plus 配置
# ============================================
mybatis-plus.mapper-locations=classpath:mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# ============================================
# JWT 配置
# ============================================
jwt.secret=${JWT_SECRET:tepinhui-jwt-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================
# SpringDoc (Swagger) 配置
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ============================================
# 数据库初始化配置
# ============================================
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:db/schema.sql

# ============================================
# 服务器配置
# ============================================
server.address=${APP_HOST:127.0.0.1}
server.port=${APP_PORT:8060}
server.servlet.context-path=${app.api-prefix}

# ============================================
# 日志配置
# ============================================
logging.level.com.tepinhui=DEBUG
logging.level.org.springframework.security=DEBUG
