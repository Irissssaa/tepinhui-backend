name: Deploy Backend

on:
  push:
    branches:
      - main
      - dev-njmd
      - dev-zyx

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ vars.SERVER_HOST }}
      SERVER_USER: ${{ vars.SERVER_USER }}
      SERVER_PORT: ${{ vars.SERVER_PORT || '222' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/tph' }}
      APP_ENV_FILE: ${{ vars.APP_ENV_FILE || '/home/tph/shared/app.env' }}
      JAVA_VERSION: ${{ vars.JAVA_VERSION || '17' }}
      DEPLOY_BRANCH: ${{ github.ref_name }}
      VERSION: ""  # 将在步骤中填充

    steps:
      - name: Validate deploy variables
        run: |
          : "${SERVER_HOST:?SERVER_HOST is required}"
          : "${SERVER_USER:?SERVER_USER is required}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate version info
        id: version
        run: |
          VERSION=$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Built version: ${VERSION}"

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # 写入部署专用密钥
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # 获取服务器主机密钥
          ssh-keyscan -p "${SERVER_PORT}" "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          # 配置 SSH（包含端口配置）
          cat > ~/.ssh/config << EOF
          Host ${SERVER_HOST}
            Port ${SERVER_PORT}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

          # 测试 SSH 连接
          ssh -o ConnectTimeout=10 "${SERVER_USER}@${SERVER_HOST}" "echo 'SSH connection successful'" || {
            echo "ERROR: Cannot establish SSH connection to ${SERVER_HOST}:${SERVER_PORT}"
            exit 1
          }

      - name: Create source package
        run: |
          # 使用 git archive 只打包提交的代码（不含 .git 目录）
          git archive HEAD -o source-code.tar.gz

          # 显示包大小
          echo "Source package created:"
          ls -lh source-code.tar.gz
          echo "Package contains $(tar tzf source-code.tar.gz | wc -l) files"

      - name: Deploy to server
        run: |
          # 使用 SSH 配置（通过 ~/.ssh/config 中的端口）
          set -e

          echo "Creating version directory on server..."
          ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "mkdir -p '${DEPLOY_PATH}/versions/${VERSION}' '${DEPLOY_PATH}/shared'"

          echo "Uploading source code package..."
          scp -P "${SERVER_PORT}" source-code.tar.gz \
            "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/versions/${VERSION}/"

          echo "Verifying upload..."
          ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "ls -lh '${DEPLOY_PATH}/versions/${VERSION}/source-code.tar.gz'"

          echo "Uploading deployment scripts..."
          scp -P "${SERVER_PORT}" deploy/deploy.sh \
            "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/deploy.sh"

          scp -P "${SERVER_PORT}" deploy/rollback.sh \
            "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/rollback.sh"

          # 创建 scripts 目录并上传回退脚本和 wrapper
          ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "mkdir -p '${DEPLOY_PATH}/scripts'"

          scp -P "${SERVER_PORT}" deploy/rollback-on-failure.sh \
            "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/scripts/"

          scp -P "${SERVER_PORT}" deploy/run-rollback.sh \
            "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/scripts/"

          echo "Setting script permissions..."
          ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "chmod +x '${DEPLOY_PATH}/deploy.sh' '${DEPLOY_PATH}/rollback.sh' '${DEPLOY_PATH}/scripts/rollback-on-failure.sh' '${DEPLOY_PATH}/scripts/run-rollback.sh'"

          echo "Running deployment script..."
          ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" "\
            chmod +x '${DEPLOY_PATH}/deploy.sh' && \
            DEPLOY_PATH='${DEPLOY_PATH}' \
            APP_ENV_FILE='${APP_ENV_FILE}' \
            VERSION='${VERSION}' \
            JAVA_VERSION='${JAVA_VERSION}' \
            '${DEPLOY_PATH}/deploy.sh'"
